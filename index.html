<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Macros Personalizada</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="hero-badge">Fitness Premium</p>
        <h1>Calculadora de Macros Personalizada</h1>
        <p class="hero-subtitle">
          Descubre cuántas calorías y macronutrientes necesitas según tu objetivo
        </p>
      </section>

      <section class="calculator-card" aria-labelledby="form-title">
        <h2 id="form-title">Completa tus datos</h2>

        <form id="macroForm" novalidate>
          <div class="grid">
            <label>
              Sexo *
              <select id="sex" required>
                <option value="">Selecciona</option>
                <option value="male">Hombre</option>
                <option value="female">Mujer</option>
              </select>
            </label>

            <label>
              Edad *
              <input id="age" type="number" min="14" max="99" placeholder="Ej: 30" required />
            </label>

            <label>
              Peso (kg) *
              <input id="weight" type="number" min="35" step="0.1" placeholder="Ej: 75" required />
            </label>

            <label>
              Altura (cm) *
              <input id="height" type="number" min="130" max="230" placeholder="Ej: 175" required />
            </label>

            <label>
              Nivel de actividad *
              <select id="activity" required>
                <option value="">Selecciona</option>
                <option value="1.2">Sedentario (1.2)</option>
                <option value="1.375">Ligero (1.375)</option>
                <option value="1.55">Moderado (1.55)</option>
                <option value="1.725">Alto (1.725)</option>
                <option value="1.9">Muy alto (1.9)</option>
              </select>
            </label>

            <label>
              Objetivo *
              <select id="goal" required>
                <option value="">Selecciona</option>
                <option value="lose">Perder grasa</option>
                <option value="maintain">Mantenimiento</option>
                <option value="gain">Ganar masa muscular</option>
              </select>
            </label>
          </div>

          <div id="goalAdjustContainer" class="goal-adjust hidden" aria-live="polite"></div>

          <label>
            % grasa corporal (opcional)
            <input id="bodyFat" type="number" min="3" max="60" step="0.1" placeholder="Ej: 18" />
          </label>

          <button id="calculateBtn" type="submit">Calcular mis macros</button>
          <p id="errorMessage" class="error" role="alert"></p>
        </form>

        <div id="leadGate" class="lead-gate hidden">
          <label>
            Introduce tu email para ver tus resultados
            <input id="email" type="email" placeholder="nombre@email.com" />
          </label>
          <button id="showResultsBtn" type="button">Ver resultados</button>
          <p id="emailError" class="error" role="alert"></p>
        </div>

        <section id="results" class="results hidden" aria-live="polite">
          <h3>Tus macros diarios recomendados</h3>
          <div class="result-grid">
            <article>
              <p class="result-label">Calorías</p>
              <p id="caloriesValue" class="result-value">0 kcal</p>
            </article>
            <article>
              <p class="result-label">Proteínas</p>
              <p id="proteinValue" class="result-value">0 g</p>
            </article>
            <article>
              <p class="result-label">Grasas</p>
              <p id="fatValue" class="result-value">0 g</p>
            </article>
            <article>
              <p class="result-label">Carbohidratos</p>
              <p id="carbValue" class="result-value">0 g</p>
            </article>
          </div>

          <div class="macro-bars">
            <div class="bar-row">
              <span>Proteínas</span>
              <div class="bar-track"><div id="proteinBar" class="bar protein"></div></div>
            </div>
            <div class="bar-row">
              <span>Grasas</span>
              <div class="bar-track"><div id="fatBar" class="bar fat"></div></div>
            </div>
            <div class="bar-row">
              <span>Carbohidratos</span>
              <div class="bar-track"><div id="carbBar" class="bar carb"></div></div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
